<body>


<div class="container">


<img src="logo.png" class="logo" alt="غزل">


<h1>📸 البوستات والمنتجات</h1>


<p class="subtitle">
إدارة بوستات ومنتجات غزل
</p>


<div class="divider"></div>





<div class="section">


<h2>📸 بيانات البوست</h2>



<label>المورد</label>


<select id="supplier">


<option value="">
اختر المورد
</option>


<option value="WD">وديع</option>

<option value="ML">ملاك</option>

<option value="GH">الغول</option>

<option value="BD">البنداري</option>

<option value="MS">مصباح</option>

<option value="BM">بابا المجال</option>

<option value="MK">الملوك رجالي</option>


</select>





<label>تاريخ البوست</label>


<input
id="postDate"
type="date">





<label>رقم البوست</label>


<input
id="postNumber"
type="number"
placeholder="مثال: 001">





<label>كود البوست</label>


<input
id="postCode"
type="text"
readonly
placeholder="سيظهر تلقائيًا">





<label>رابط البوست</label>


<input
id="postLink"
type="url"
placeholder="الصق رابط البوست هنا">





<button id="nextBtn" type="button">

التالي ➡️

</button>



</div>
