<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة غزل</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#800020">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

</head>


<body>

<div class="container">


<img src="logo.png" class="logo" alt="غزل">


<h1>حاسبة غزل</h1>


<p class="subtitle">
احسبي تكلفة وتسعير منتجات غزل بكل احترافية
</p>


<div class="divider"></div>



<div class="section">


<h2>🧾 التكلفة</h2>


<label>سعر الشراء</label>

<input
id="buyPrice"
type="number"
placeholder="مثال: 150">


<label>المصاريف الإضافية</label>

<input
id="extraCost"
type="number"
value="20"
readonly>



<div class="result">


<span class="result-title">
التكلفة الحقيقية
</span>


<span
id="totalCost"
class="result-value">

0 جنيه

</span>


</div>


</div>
<div class="section">

<h2>💰 التسعير</h2>


<label>نسبة الربح المطلوبة %</label>

<input
id="desiredProfit"
type="number"
placeholder="مثال: 50">


<div class="result">


<span class="result-title">

سعر البيع المقترح

</span>


<span
id="suggestedPrice"
class="result-value">

0 جنيه

</span>


</div>


</div>




<div class="section">


<h2>🎁 العرض</h2>


<label>سعر البيع</label>


<input
id="sellPrice"
type="number"
placeholder="مثال: 350">



<label>نسبة الخصم %</label>


<input
id="discount"
type="number"
placeholder="مثال: 10">



<div class="result">


<span class="result-title">

السعر بعد الخصم

</span>


<span
id="finalPrice"
class="result-value">

0 جنيه

</span>


</div>



<div class="result">


<span class="result-title">

الربح النهائي

</span>


<span
id="finalProfit"
class="result-value">

0 جنيه

</span>


</div>


</div>
<button onclick="clearCalculator()">

🗑️ مسح البيانات

</button>



<div class="footer">

© Ghazal Calculator

</div>


</div>



<script src="script.js"></script>


<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", function() {

navigator.serviceWorker.register("service-worker.js")

.then(function() {

console.log("Ghazal PWA Ready");

})

.catch(function(error) {

console.log("Service Worker Error:", error);

});

});

}

</script>



</body>

</html>
