<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إضافة منتجات | غزل</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="posts.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>🛍️ إضافة المنتجات</h1>

<p class="subtitle">

أضيفي منتجات البوست

</p>

<div id="productsContainer">

<div class="post-card">

<h2>المنتج 1</h2>

<label>اسم المنتج</label>

<input
type="text"
class="productName"
placeholder="اسم المنتج">

<label>التصنيف</label>

<select class="category">

<option>خاتم</option>
<option>حلق</option>
<option>سلسلة</option>
<option>إنسيال</option>
<option>إسورة</option>
<option>حظاظة</option>
<option>ساعة</option>
<option>رجالي</option>
<option>باندل</option>

</select>

<label>سعر الشراء</label>

<input
type="number"
class="buyPrice"
placeholder="0">

<label>نسبة الربح</label>

<select class="profit">

<option value="">بدون</option>
<option>40</option>
<option>50</option>
<option>60</option>
<option>70</option>
<option>80</option>
<option>90</option>
<option>100</option>
<option>110</option>
<option>120</option>
<option>130</option>
<option>140</option>
<option>150</option>

</select>

<label>الخصم</label>

<select class="discount">

<option value="0">بدون</option>
<option value="10">10%</option>
<option value="25">25%</option>

</select>

<label>سعر البيع</label>

<input
type="text"
class="sellPrice"
readonly>

<label>سعر العرض</label>

<input
type="text"
class="offerPrice"
readonly>
<button
type="button"
class="deleteBtn">

🗑 حذف المنتج

</button>

</div>

</div>

<button
type="button"
id="addProductBtn"
class="posts-btn">

➕ إضافة منتج آخر

</button>

<button
type="button"
id="savePostBtn"
class="posts-btn">

💾 حفظ البوست

</button>

</div>


<div class="bottom-nav">

<a href="index.html">
🧮<br>الحاسبة
</a>

<a href="posts.html" class="active">
📸<br>البوستات
</a>

</div>
<script src="products.js"></script>
</body>

</html>
